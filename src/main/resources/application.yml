spring:
  application:
    name: MolBioLearner

  datasource:
    url: jdbc:h2:file:./data/molbiolearner;AUTO_SERVER=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        db-trace: false
        web-allow-others: true

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:dev-placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:dev-placeholder}
            scope: read:user,user:email
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-placeholder}
            scope: openid,profile,email

server:
  port: ${PORT:8080}
  forward-headers-strategy: native

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  dev-mode: ${DEV_MODE:true}
  admin-email: ${ADMIN_EMAIL:olsen.mark@gmail.com}
